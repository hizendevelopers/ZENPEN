services:
  - type: redis
    name: zenpen-redis
    ipAllowList: []
    plan: starter

  - type: web
    name: zenpen-web
    runtime: docker
    plan: starter
    autoDeploy: true
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: zenpen-redis
          property: connectionString

  - type: worker
    name: zenpen-worker
    runtime: docker
    plan: starter
    autoDeploy: true
    dockerCommand: python -m backend.worker
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: zenpen-redis
          property: connectionString
